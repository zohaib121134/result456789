<!DOCTYPE html>

<html>
<head>

<title>The Guardian International School System - Result</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.header{
background:#003366;
color:white;
padding:20px;
}

.logo{
width:120px;
}

.search-box{
margin:30px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
width:650px;
margin:auto;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-top:20px;
}

.student-photo{
width:120px;
border-radius:10px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#003366;
color:white;
}

.total{
font-weight:bold;
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo"><br>

<h2>The Guardian International School System</h2>
<h3>Hassan Campus</h3>
<h3>Annual Result</h3>

</div>

<div class="search-box">

<input type="text" id="roll" placeholder="Enter Roll Number">
<button onclick="searchResult()">Search Result</button>

</div>

<div id="result"></div>

<script>

let students=[];

fetch("data.json")
.then(res=>res.json())
.then(data=>students=data);

function searchResult(){

let roll=document.getElementById("roll").value.trim();

let s = students.find(x => x.roll == roll);

if(!s){
document.getElementById("result").innerHTML="<h3>Result Not Found</h3>";
return;
}

let subjectRows="";
let grandTotal=0;
let grandObt=0;

for(let key in s){

if(key.includes("_total")){

let subject = key.replace("_total","").toUpperCase();
let total = Number(s[key]);
let obt = Number(s[subject.toLowerCase()+"_obt"]);

grandTotal += total;
grandObt += obt;

subjectRows += `
<tr>
<td>${subject}</td>
<td>${total}</td>
<td>${obt}</td>
</tr>
`;

}

}

let percent = (grandObt / grandTotal) * 100;

let grade="";
let remarks="";

if(percent>=95){
grade="A+";
remarks="Fabulous, Excellent! Congratulations, student promoted to next class";
}
else if(percent>=90){
grade="A";
remarks="Excellent! Congratulations, student promoted to next class";
}
else if(percent>=85){
grade="B+";
remarks="Very Good! Congratulations, student promoted to next class";
}
else if(percent>=80){
grade="B";
remarks="Very Good! Congratulations, student promoted to next class";
}
else if(percent>=70){
grade="C";
remarks="Good! Student promoted to next class";
}
else if(percent>=40){
grade="U";
remarks="Pass! Student promoted to next class";
}
else{
grade="F";
remarks="Fail";
}

document.getElementById("result").innerHTML = `
<div class="card">

<img src="photos/${s.photo}" class="student-photo">

<h3>${s.name}</h3>

<p><b>Father Name:</b> ${s.father}</p>
<p><b>Class:</b> ${s.class}</p>
<p><b>Date of Birth:</b> ${s.dob}</p>

<table>

<tr>
<th>Subject</th>
<th>Total</th>
<th>Obtained</th>
</tr>

${subjectRows}

<tr class="total">
<td>Grand Total</td>
<td>${grandTotal}</td>
<td>${grandObt}</td>
</tr>

</table>

<h3>Percentage: ${percent.toFixed(2)}%</h3>
<h3>Grade: ${grade}</h3>
<h3>Remarks: ${remarks}</h3>

</div>
`;

}

</script>

</body>
</html>
